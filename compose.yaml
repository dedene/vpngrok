services:
  vpn:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./.docker/gluetun:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-mullvad}
      VPN_TYPE: ${VPN_TYPE:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:-}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES:-}
      OPENVPN_USER: ${OPENVPN_USER:-}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES:-USA}
      SERVER_CITIES: ${SERVER_CITIES:-}
      TZ: ${TZ:-Etc/UTC}
    restart: unless-stopped

  dev:
    build:
      context: ./docker/dev
    network_mode: "service:vpn"
    volumes:
      - ${WORKSPACE_ROOT:-${HOME}/Development}:${WORKSPACE_ROOT:-${HOME}/Development}
      - ./.docker/dev-home:/root
      # Personal skills, read-only. Grok scans these home-level dirs
      # (plus .grok/.agents/.claude/.cursor dirs inside each project).
      - ${HOME}/.agents:/root/.agents:ro
      - ${HOME}/.grok/skills:/root/.grok/skills:ro
      - ${HOME}/.claude/skills:/root/.claude/skills:ro
      # Share the session store with the host so /resume sees the same
      # sessions in both. Works because host paths map 1:1 in the container.
      - ${HOME}/.grok/sessions:/root/.grok/sessions
    working_dir: ${WORKSPACE_ROOT:-${HOME}/Development}
    environment:
      TERM: xterm-256color
      COLORTERM: truecolor
      PATH: /root/.grok/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      XAI_API_KEY: ${XAI_API_KEY:-}
    stdin_open: true
    tty: true
    depends_on:
      vpn:
        condition: service_healthy
